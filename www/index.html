<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Bicho Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1> Jogo do Bicho</h1>

<!-- 🔐 LOGIN -->
<div id="login" class="tela">

  <h2>Entrar</h2>

  <input id="user" placeholder="Usuário"><br><br>
  <input id="pass" type="password" placeholder="Senha"><br><br>

  <button onclick="login(user.value, pass.value)">Entrar</button>
  <button onclick="cadastrar(user.value, pass.value)">Cadastrar</button>

</div>

<!-- 🔥 APP -->
<div id="app">

  <!-- TOPO -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div id="userInfo"></div>
    <button onclick="logout()">Sair</button>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button class="menu-btn" onclick="trocarTela('home', this)">🏠 Tabela</button>
    <button class="menu-btn" onclick="trocarTela('resultados', this)">Resultados</button>
    <button class="menu-btn" onclick="trocarTela('analise', this)">Análise</button>
    <button class="menu-btn" onclick="trocarTela('palpite', this)">Palpite</button>
    <button class="menu-btn" onclick="trocarTela('mapa', this)">Mapa</button>
  </div>

  <div id="bancasBox"></div>

  <!-- TELAS -->
  <div id="home" class="tela"><div id="tabela"></div></div>
  <div id="resultados" class="tela"><div id="resultadosBox"></div></div>
  <div id="analise" class="tela"><div id="analiseBox"></div></div>

  <div id="palpite" class="tela">
    <button onclick="carregarPalpite()">Gerar</button>
    <div id="palpiteBox"></div>
  </div>

  <div id="mapa" class="tela">
    <div id="mapaBotoes"></div>
    <div id="mapaGrid"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
